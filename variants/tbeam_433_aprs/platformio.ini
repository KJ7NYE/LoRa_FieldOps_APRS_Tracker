; LilyGo T-Beam v1.2 — 433 MHz APRS multi-role (Tracker / iGate / Digipeater)
;
; Full-featured: onboard GPS + WiFi + BT Classic + BLE.
; Default role: Tracker with GPS_INTERNAL and SmartBeaconing.
; Switch to iGate or Digipeater via web UI or serial CLI ("role set ...").
;
; Build:  pio run -e tbeam_433_aprs
; Upload: pio run -e tbeam_433_aprs -t upload
; FS:     pio run -e tbeam_433_aprs -t uploadfs

[env:tbeam_433_aprs]
extends = env:esp32
board = ttgo-t-beam
build_flags =
    ${common.build_flags}
    -D RADIOLIB_EXCLUDE_LR11X0=1
    -D RADIOLIB_EXCLUDE_SX126X=1
    -D RADIOLIB_EXCLUDE_SX128X=1
    -D TTGO_T_Beam_V1_2_433_APRS
lib_deps =
    ${common.lib_deps}
    ${common.display_libs}
    lewisxhe/XPowersLib @ 0.2.4
    adafruit/Adafruit SH110X @ 2.1.10
